<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="hotwall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b3272d"/><stop offset="1" stop-color="#e2593a"/>
    </linearGradient>
    <linearGradient id="airup" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7fb3e0"/><stop offset="1" stop-color="#e8a87c"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8502e"/>
    </marker>
    <marker id="arrb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3d6bb3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="460" fill="#fafaf8"/>

  <!-- ground -->
  <line x1="20" y1="430" x2="740" y2="430" stroke="#9a968c" stroke-width="2"/>
  <path d="M30,430 l-8,10 M60,430 l-8,10 M90,430 l-8,10 M120,430 l-8,10 M150,430 l-8,10 M180,430 l-8,10 M210,430 l-8,10 M240,430 l-8,10 M270,430 l-8,10 M300,430 l-8,10 M330,430 l-8,10 M360,430 l-8,10 M390,430 l-8,10 M420,430 l-8,10 M450,430 l-8,10 M480,430 l-8,10 M510,430 l-8,10 M540,430 l-8,10 M570,430 l-8,10 M600,430 l-8,10 M630,430 l-8,10 M660,430 l-8,10 M690,430 l-8,10 M720,430 l-8,10" stroke="#c5c1b8" stroke-width="1.5"/>

  <!-- reactor vessel wall (hot) -->
  <rect x="150" y="150" width="46" height="280" fill="url(#hotwall)" rx="3"/>
  <text x="173" y="140" text-anchor="middle" font-size="15" font-weight="600" fill="#b3272d">hot vessel wall</text>
  <text x="173" y="121" text-anchor="middle" font-size="13" fill="#8a4a44">300–400 °C</text>
  <!-- glow lines -->
  <g stroke="#e2593a" stroke-width="1.4" opacity="0.55">
    <path d="M148,180 q-10,6 -14,0" fill="none"/><path d="M148,240 q-10,6 -14,0" fill="none"/>
    <path d="M148,300 q-10,6 -14,0" fill="none"/><path d="M148,360 q-10,6 -14,0" fill="none"/>
  </g>

  <!-- radiation arrows across the air gap -->
  <g stroke="#c8502e" stroke-width="3">
    <line x1="200" y1="190" x2="292" y2="190" marker-end="url(#arr)"/>
    <line x1="200" y1="250" x2="292" y2="250" marker-end="url(#arr)"/>
    <line x1="200" y1="310" x2="292" y2="310" marker-end="url(#arr)"/>
    <line x1="200" y1="370" x2="292" y2="370" marker-end="url(#arr)"/>
  </g>
  <text x="250" y="172" text-anchor="middle" font-size="14.5" fill="#c8502e" font-weight="600">radiation (T⁴)</text>
  <text x="248" y="450" text-anchor="middle" font-size="12.5" fill="#8a8578">air gap — no contact; ~80–90% of the heat crosses as glow</text>
  

  <!-- riser ducts -->
  <rect x="300" y="150" width="40" height="280" fill="#8f9aa6" rx="3"/>
  <rect x="306" y="156" width="28" height="268" fill="url(#airup)" rx="2"/>
  <text x="352" y="135" font-size="15" font-weight="600" fill="#5a6570">steel ducts</text>
  <line x1="348" y1="140" x2="336" y2="152" stroke="#8f9aa6" stroke-width="1.5"/>

  <!-- air rising inside duct -->
  <g stroke="#3d6bb3" stroke-width="3" fill="none">
    <path d="M320,410 C314,380 328,350 320,320 C313,292 327,262 320,232" marker-end="url(#arrb)"/>
  </g>

  <!-- chimney -->
  <rect x="306" y="40" width="28" height="116" fill="#c8ccd2"/>
  <rect x="306" y="40" width="28" height="116" fill="url(#airup)" opacity="0.5"/>
  <text x="352" y="60" font-size="15" font-weight="600" fill="#5a6570">chimney (~20 m)</text>
  <text x="352" y="80" font-size="13" fill="#8a8578">warm air, lighter,</text>
  <text x="352" y="97" font-size="13" fill="#8a8578">keeps rising on its own</text>
  <!-- exhaust -->
  <g stroke="#e8a87c" stroke-width="3" fill="none">
    <path d="M314,38 q-4,-14 4,-26" marker-end="url(#arr)"/>
    <path d="M326,38 q4,-14 -4,-26" marker-end="url(#arr)"/>
  </g>
  <text x="245" y="25" text-anchor="middle" font-size="13.5" fill="#c8502e">warm air out</text>

  <!-- cold air inlet -->
  <g stroke="#3d6bb3" stroke-width="3" fill="none">
    <path d="M460,415 C420,418 380,414 344,412" marker-end="url(#arrb)"/>
  </g>
  <text x="475" y="404" font-size="13.5" fill="#3d6bb3">cold outside air in</text>
  <text x="475" y="420" font-size="12.5" fill="#8a8578">(pulled in by the draft — no fan)</text>

  <g>
    <rect x="520" y="120" width="222" height="176" rx="10" fill="#ffffff" stroke="#e4e2dc"/>
    <text x="536" y="148" font-size="14.5" font-weight="700" fill="#1c1c1c">The whole machine:</text>
    <text x="536" y="176" font-size="13.5" fill="#c8502e" font-weight="600">1. hot things glow</text>
    <text x="536" y="194" font-size="12.5" fill="#6a665c">heat crosses the gap as light</text>
    <text x="536" y="222" font-size="13.5" fill="#3d6bb3" font-weight="600">2. hot air rises</text>
    <text x="536" y="240" font-size="12.5" fill="#6a665c">the chimney pulls ~0.5 kg/s</text>
    <text x="536" y="268" font-size="13.5" fill="#1a7a1a" font-weight="600">no pumps, no valves,</text>
    <text x="536" y="286" font-size="13.5" fill="#1a7a1a" font-weight="600">no software, no moving parts</text>
  </g>
</svg>
