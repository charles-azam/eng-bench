[metadata]
task_id = "nstf-supplied-duty"
description = "Predict the measured thermal-hydraulic behavior of Argonne's NSTF half-scale passive cooling facility from a bounded evidence pack; the thermal duty curve is supplied (ablation of nstf-blind)."
tags = ["engineering", "thermal-hydraulics", "prediction", "nstf-bench"]

[agent]
timeout_sec = 4500.0

[verifier]
timeout_sec = 900.0
network_mode = "no-network"

[environment]
build_timeout_sec = 1800.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
network_mode = "allowlist"
# Provider endpoints the agent CLIs need, plus package indexes so the agent can
# install what it wants. The facility's published reports stay unreachable.
# Enforcement requires Harbor's egress-control sidecar (Linux hosts). Tighten or
# extend per agent during smoke runs.
allowed_hosts = [
    "api.anthropic.com",
    "statsig.anthropic.com",
    "sentry.io",
    "api.openai.com",
    "auth.openai.com",
    "chatgpt.com",
    "generativelanguage.googleapis.com",
    "pypi.org",
    "files.pythonhosted.org",
    "registry.npmjs.org",
]
